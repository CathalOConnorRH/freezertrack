server {
    listen 80;
    root /usr/share/nginx/html;

    # Hashed assets from Vite can be cached long-term
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must never be cached so the browser always
    # fetches the latest asset references after a deploy
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }
}
