services:
  backend:
    build: ./backend
    restart: unless-stopped
    # Uncomment cap_add if using Bluetooth label printing from Docker:
    # cap_add:
    #   - NET_ADMIN
    #   - NET_RAW
    volumes:
      - ./data:/app/data
    env_file: .env

  frontend:
    build: ./frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
